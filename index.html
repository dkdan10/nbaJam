<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./src/style.css">
    <title>NBA Jam Multiplayer</title>
</head>
<body>
    <main class="page-shell">
        <section class="project-hero" aria-labelledby="project-title">
            <div class="hero-copy">
                <p class="eyebrow">Canvas basketball game</p>
                <h1 id="project-title">NBA Jam Multiplayer</h1>
                <div class="hero-actions" aria-label="Project links">
                    <a class="button primary" href="https://nbajam-multiplayer.onrender.com">
                        Play Online Multiplayer
                    </a>
                    <a class="button secondary" href="https://github.com/dkdan10/nbaJam">
                        View Github Page
                    </a>
                </div>
            </div>
            <div class="version-panel" aria-label="Project versions">
                <div>
                    <span class="version-label">Game Description</span>
                    <p>The full realtime version runs on Render with Express and Socket.IO.
                    This GitHub Pages build hosts only the static game. To play the multiplayer version click the link!</p>
                </div>
            </div>
        </section>

        <section id="local-game" class="game-section" aria-label="Static local game">
            <canvas id="nba-jam-game" width="820" height="480"></canvas>
        </section>
    </main>

    <script type="module" src="./src/index.js"></script>
</body>
</html>
